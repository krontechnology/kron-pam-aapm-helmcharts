# Default values for kron-aapm-sidecar.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: krontechnology/aapm-sidecar-injector
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.2.1"

sidecarImage:
  repository: krontechnology/aapm-client
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.2.1"
  name: "aapm-client"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "aapm-sidecar-injector"

clusterRole:
  name: "aapm-sidecar-injector"

clusterRoleBinding:
  name: "aapm-sidecar-injector"

namespace:
  name: ""
  create: false

configMap:
  name: "aapm-configmap"

# AAPM agent connection parameters — stored in a K8s Secret and injected as env vars.
aapmConnection:
  agentService: ""       # e.g. "aapm-agent.aapm.svc.cluster.local"
  agentPort: 443
  directAccessUrl: ""    # e.g. "https://aapm.example.com"
  disableSecureChannel: false
  ignoreCertificate: false
  disableInterceptorSecureRequest: false
  ignoreInterceptorCertificate: false

# Default poll interval for the sidecar (ms).
# Account definitions are configured per target namespace via aapm-client-secret.
aapmClient:
  pollIntervalMs: 30000

# Content mounted into the AAPM sidecar container at /keystore/aapm.conf.
aapmConfig:
  content: |
    # AAPM client configuration
    # Add connection and authentication settings here

podAnnotations: {}

podSecurityContext: {} # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  port: 443
  targetPort: 8443

volumeMounts:
  name: "keystore"
  path: "/keystore"

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
