apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kron-aapm-sidecar.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ include "kron-aapm-sidecar.fullname" . }}
data:
  sidecarconfig.yaml: |
    containers:
    - name: {{ .Values.sidecarImage.name }}
      image: "{{ .Values.sidecarImage.repository }}:{{ .Values.sidecarImage.tag | default .Chart.AppVersion }}"
      imagePullPolicy: {{ .Values.sidecarImage.pullPolicy }}
      env:
      - name: SPRING_PROFILES_ACTIVE
        value: aapm-client
      - name: SPRING_CONFIG_ADDITIONAL_LOCATION
        value: /etc/aapm-config/
      - name: AGENT_SERVICE
        valueFrom:
          secretKeyRef:
            name: aapm-client-secret
            key: AGENT_SERVICE
      - name: AGENT_PORT
        valueFrom:
          secretKeyRef:
            name: aapm-client-secret
            key: AGENT_PORT
      - name: DIRECT_ACCESS_URL
        valueFrom:
          secretKeyRef:
            name: aapm-client-secret
            key: DIRECT_ACCESS_URL
      volumeMounts:
       - name: {{ .Values.volumeMounts.name }}
         mountPath: {{ .Values.volumeMounts.path }}
       - name: aapm-client-config
         mountPath: /etc/aapm-config
         readOnly: true
    volumes:
       - name: {{ .Values.volumeMounts.name }}
         configMap:
                name: {{ .Values.configMap.name }}
       - name: aapm-client-config
         secret:
           secretName: aapm-client-secret
           items:
           - key: application-aapm-client.yml
             path: application-aapm-client.yml
