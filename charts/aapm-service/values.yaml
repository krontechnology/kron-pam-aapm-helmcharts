replicaCount: 1

image:
  repository: krontechnology/aapm-service
  pullPolicy: IfNotPresent
  tag: "1.1.2"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "as-service-account"

podAnnotations: {}
podLabels:
  kron.aapm.service: vault

role:
  name: "aapm-service-access"
  bindingName: "bind-aapm-service-access"

podSecurityContext: {} # fsGroup: 2000

securityContext: {}

tls:
  enabled: false
  keystorePath: "/etc/tls/keystore.p12"
  password: "<your_password>"
  secretName: "grpc-tls-secret"
  keyAlias: "<your_alias>"

agent:
  service: "<your_agent_url>"
  port: "<your_agent_port>"
  disableSecureChannel: false
  ignoreCertificate: false

interceptor:
  disableSecureRequest: false
  ignoreCertificate: false

pam:
  url: "<your_pam_url>"

# Client user credentials — sensitive values (secret, token) are read from
# a pre-existing Kubernetes Secret referenced by clientCredentials.secretName.
# Each user maps to a key in that Secret.
clientCredentials:
  secretName: "aapm-client-credentials"

client:
  enabled: false
  keystoreDir: "/keystore"
  users:
    - label: "USER1"
      accPath: "/"
      secretKey: "user1-secret"
      tokenKey: "user1-token"

service:
  type: ClusterIP
  port: 8443
  targetPort: 8443
  name: aapm-service

access:
  key: default

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
