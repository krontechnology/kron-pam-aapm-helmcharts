# Default values for kron-aapm-agent.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: krontechnology/aapm-agent
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.8.3"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

secrets:
  name: aapm-agent-secrets
  type: Opaque
  connection: aHR0cHM=
  installToken: <your-install-token>
  address: <your-pam-address>
  failoverAddress: ""
  keystorePassword: ""

config:
  grpc:
    port: 8080
  singleconnect:
    protocol: "https"
    agentName: "default-agent"
    sslIgnored: false
    hostnameIgnored: false
  password:
    statusCheck:
      regular: 60
      intensive: 5
      bufferInSeconds: 60
      graceInMinutes: 0
  tools:
    authentication: false
  system:
    serviceMode: false
  machineId: "agent-docker"
  app:
    ipAddress: "8.8.8.8"
    grpc:
      security:
        enabled: true
        protocols: "TLSv1.2,TLSv1.3"
        ciphers: "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
        dist:
          certChain: "classpath:cert/server.crt"
          privateKey: "classpath:cert/server.pem"

container:
  port: 8080

podAnnotations: { aapm-sidecar-injector.kron.com/inject: "false" }

podSecurityContext: {} # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: NodePort
  port: 8080
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilyPolicy: SingleStack

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

extraVolumes: []
# - name: aapm-agent-certs
#   secret:
#     secretName: aapm-agent-certs

extraVolumeMounts: []
# - name: aapm-agent-certs
#   mountPath: /etc/kron-agent/certs
#   readOnly: true
