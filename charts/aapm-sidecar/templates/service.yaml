apiVersion: v1
kind: Service
metadata:
  name: {{ include "kron-aapm-sidecar.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ include "kron-aapm-sidecar.fullname" . }}
spec:
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
  selector:
    app: {{ include "kron-aapm-sidecar.fullname" . }}
