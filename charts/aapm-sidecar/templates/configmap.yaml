apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kron-aapm-sidecar.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ include "kron-aapm-sidecar.fullname" . }}
data:
  sidecarconfig.yaml: |
    containers:
    - name: {{ .Values.sidecarImage.name }}
      image: "{{ .Values.sidecarImage.repository }}:{{ .Values.sidecarImage.tag | default .Chart.AppVersion }}"
      imagePullPolicy: {{ .Values.sidecarImage.pullPolicy }}
      env:
      - name: SPRING_PROFILES_ACTIVE
        value: aapm-client
      - name: SPRING_CONFIG_ADDITIONAL_LOCATION
        value: optional:/etc/aapm-config/
      - name: AGENT_SERVICE
        value: {{ .Values.aapmConnection.agentService | quote }}
      - name: AGENT_PORT
        value: {{ .Values.aapmConnection.agentPort | toString | quote }}
      - name: DIRECT_ACCESS_URL
        value: {{ .Values.aapmConnection.directAccessUrl | quote }}
      - name: DISABLE_AGENT_SECURE_CHANNEL
        value: {{ .Values.aapmConnection.disableSecureChannel | quote }}
      - name: IGNORE_AGENT_CERTIFICATE
        value: {{ .Values.aapmConnection.ignoreCertificate | quote }}
      - name: DISABLE_INTERCEPTOR_SECURE_REQUEST
        value: {{ .Values.aapmConnection.disableInterceptorSecureRequest | quote }}
      - name: IGNORE_INTERCEPTOR_CERTIFICATE
        value: {{ .Values.aapmConnection.ignoreInterceptorCertificate | quote }}
      volumeMounts:
       - name: {{ .Values.volumeMounts.name }}
         mountPath: {{ .Values.volumeMounts.path }}
       - name: aapm-client-config
         mountPath: /etc/aapm-config
         readOnly: true
    volumes:
       - name: {{ .Values.volumeMounts.name }}
         emptyDir: {}
       - name: aapm-client-config
         secret:
           secretName: aapm-client-secret
           items:
           - key: application-aapm-client.yml
             path: application-aapm-client.yml
